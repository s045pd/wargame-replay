name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  NODE_VERSION: '20'
  ZIG_VERSION: '0.13.0'

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            cc: zig cc -target x86_64-linux-gnu
            cxx: zig c++ -target x86_64-linux-gnu
          - os: ubuntu-latest
            goos: linux
            goarch: arm64
            cc: zig cc -target aarch64-linux-gnu
            cxx: zig c++ -target aarch64-linux-gnu
          - os: macos-latest
            goos: darwin
            goarch: amd64
            cc: ""
            cxx: ""
          - os: macos-latest
            goos: darwin
            goarch: arm64
            cc: ""
            cxx: ""
          - os: ubuntu-latest
            goos: windows
            goarch: amd64
            cc: zig cc -target x86_64-windows-gnu
            cxx: zig c++ -target x86_64-windows-gnu
          - os: ubuntu-latest
            goos: windows
            goarch: arm64
            cc: zig cc -target aarch64-windows-gnu
            cxx: zig c++ -target aarch64-windows-gnu

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod
          cache-dependency-path: server/go.sum

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Set up Zig
        if: matrix.cc != ''
        uses: mlugg/setup-zig@v1
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Build frontend
        working-directory: web
        run: |
          npm ci
          npm run build

      - name: Copy frontend to server
        run: |
          rm -rf server/static
          cp -r web/dist server/static

      - name: Build binary
        working-directory: server
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '1'
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
        run: |
          EXT=""
          if [ "${{ matrix.goos }}" = "windows" ]; then
            EXT=".exe"
          fi
          go build -trimpath -ldflags="-s -w -X main.version=${{ github.ref_name }}" \
            -o "../wargame-replay${EXT}" .

      # ── macOS: create .app bundle with icon + ad-hoc signing ──
      - name: Create macOS app bundle
        if: matrix.goos == 'darwin'
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION_NUM="${VERSION#v}"
          APP_NAME="MilSim Replay"
          BUNDLE="${APP_NAME}.app"

          # Create bundle directory structure
          mkdir -p "${BUNDLE}/Contents/MacOS"
          mkdir -p "${BUNDLE}/Contents/Resources"

          # Copy the actual binary into Resources
          cp wargame-replay "${BUNDLE}/Contents/Resources/"

          # Copy launcher script
          cp assets/macos/launcher.sh "${BUNDLE}/Contents/MacOS/MilSimReplay"
          chmod +x "${BUNDLE}/Contents/MacOS/MilSimReplay"

          # Create Info.plist from template
          sed -e "s/__VERSION__/${VERSION_NUM}/" \
              -e "s/__BUILD__/${VERSION_NUM}/" \
              assets/macos/Info.plist > "${BUNDLE}/Contents/Info.plist"

          # Generate .icns from existing PNGs
          mkdir -p AppIcon.iconset
          cp assets/icon-16.png  AppIcon.iconset/icon_16x16.png
          cp assets/icon-32.png  AppIcon.iconset/icon_16x16@2x.png
          cp assets/icon-32.png  AppIcon.iconset/icon_32x32.png
          cp assets/icon-64.png  AppIcon.iconset/icon_32x32@2x.png
          cp assets/icon-128.png AppIcon.iconset/icon_128x128.png
          cp assets/icon-256.png AppIcon.iconset/icon_128x128@2x.png
          cp assets/icon-256.png AppIcon.iconset/icon_256x256.png
          cp assets/icon-512.png AppIcon.iconset/icon_256x256@2x.png
          cp assets/icon-512.png AppIcon.iconset/icon_512x512.png
          iconutil -c icns AppIcon.iconset -o "${BUNDLE}/Contents/Resources/AppIcon.icns"

          # Ad-hoc code signing (reduces Gatekeeper warnings)
          codesign --force --deep -s - wargame-replay
          codesign --force --deep -s - "${BUNDLE}"

          echo "✅ App bundle created: ${BUNDLE}"
          echo "   Bundle ID: com.milsim.replay"
          echo "   Version: ${VERSION_NUM}"

      # ── Windows: package as .zip ──
      - name: Package (Windows)
        if: matrix.goos == 'windows'
        run: |
          zip "wargame-replay-${{ matrix.goos }}-${{ matrix.goarch }}.zip" wargame-replay.exe

      # ── macOS: package .app bundle + bare binary ──
      - name: Package (macOS)
        if: matrix.goos == 'darwin'
        run: |
          tar czf "wargame-replay-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz" \
            "MilSim Replay.app" wargame-replay

      # ── Linux: package as .tar.gz ──
      - name: Package (Linux)
        if: matrix.goos == 'linux'
        run: |
          tar czf "wargame-replay-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz" wargame-replay

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wargame-replay-${{ matrix.goos }}-${{ matrix.goarch }}
          path: wargame-replay-*.*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -lhR artifacts/

      - name: Generate checksums
        working-directory: artifacts
        run: |
          sha256sum wargame-replay-* > checksums.txt
          cat checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/wargame-replay-*
            artifacts/checksums.txt
          body: |
            ## Wargame Replay ${{ github.ref_name }}

            ### 下载 / Download

            | 平台 Platform | 文件 File | 说明 |
            |---|---|---|
            | macOS Apple Silicon | `wargame-replay-darwin-arm64.tar.gz` | 含 .app 包，双击启动 |
            | macOS Intel | `wargame-replay-darwin-amd64.tar.gz` | 含 .app 包，双击启动 |
            | Windows x64 | `wargame-replay-windows-amd64.zip` | 内嵌图标 |
            | Windows ARM64 | `wargame-replay-windows-arm64.zip` | 内嵌图标 |
            | Linux x64 | `wargame-replay-linux-amd64.tar.gz` | |
            | Linux ARM64 | `wargame-replay-linux-arm64.tar.gz` | |

            ### 使用方法 / Usage

            **macOS** — 解压后双击 `MilSim Replay.app`，自动打开浏览器。
            数据默认存放在 `~/MilSimReplay/`，也可通过 Web 界面拖拽上传。

            > ⚠️ 首次打开可能需要：右键 → 打开，或运行 `xattr -cr MilSim\ Replay.app`

            **Windows / Linux** — 解压后命令行启动：
            ```bash
            ./wargame-replay -dir ./data
            # 浏览器打开 http://127.0.0.1:8080
            ```

            也可通过 Web 界面拖拽上传 `.db` 文件。
