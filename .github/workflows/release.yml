name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  NODE_VERSION: '20'
  ZIG_VERSION: '0.13.0'

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            cc: zig cc -target x86_64-linux-gnu
            cxx: zig c++ -target x86_64-linux-gnu
          - os: ubuntu-latest
            goos: linux
            goarch: arm64
            cc: zig cc -target aarch64-linux-gnu
            cxx: zig c++ -target aarch64-linux-gnu
          - os: macos-latest
            goos: darwin
            goarch: amd64
            cc: ""
            cxx: ""
          - os: macos-latest
            goos: darwin
            goarch: arm64
            cc: ""
            cxx: ""
          - os: ubuntu-latest
            goos: windows
            goarch: amd64
            cc: zig cc -target x86_64-windows-gnu
            cxx: zig c++ -target x86_64-windows-gnu
          - os: ubuntu-latest
            goos: windows
            goarch: arm64
            cc: zig cc -target aarch64-windows-gnu
            cxx: zig c++ -target aarch64-windows-gnu

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod
          cache-dependency-path: server/go.sum

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Set up Zig
        if: matrix.cc != ''
        uses: mlugg/setup-zig@v1
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Build frontend
        working-directory: web
        run: |
          npm ci
          npm run build

      - name: Copy frontend to server
        run: |
          rm -rf server/static
          cp -r web/dist server/static

      - name: Build binary
        working-directory: server
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '1'
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
        run: |
          EXT=""
          if [ "${{ matrix.goos }}" = "windows" ]; then
            EXT=".exe"
          fi
          go build -trimpath -ldflags="-s -w -X main.version=${{ github.ref_name }}" \
            -o "../wargame-replay${EXT}" .

      # Windows: package as .zip
      - name: Package (Windows)
        if: matrix.goos == 'windows'
        run: |
          zip "wargame-replay-${{ matrix.goos }}-${{ matrix.goarch }}.zip" wargame-replay.exe

      # Linux / macOS: package as .tar.gz
      - name: Package (Unix)
        if: matrix.goos != 'windows'
        run: |
          tar czf "wargame-replay-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz" wargame-replay

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wargame-replay-${{ matrix.goos }}-${{ matrix.goarch }}
          path: wargame-replay-*.*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -lhR artifacts/

      - name: Generate checksums
        working-directory: artifacts
        run: |
          sha256sum wargame-replay-* > checksums.txt
          cat checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/wargame-replay-*
            artifacts/checksums.txt
          body: |
            ## Wargame Replay ${{ github.ref_name }}

            ### 下载 / Download

            | 平台 Platform | 文件 File |
            |---|---|
            | Windows x64 | `wargame-replay-windows-amd64.zip` |
            | Windows ARM64 | `wargame-replay-windows-arm64.zip` |
            | macOS Intel | `wargame-replay-darwin-amd64.tar.gz` |
            | macOS Apple Silicon | `wargame-replay-darwin-arm64.tar.gz` |
            | Linux x64 | `wargame-replay-linux-amd64.tar.gz` |
            | Linux ARM64 | `wargame-replay-linux-arm64.tar.gz` |

            ### 使用方法 / Usage

            ```bash
            # 解压后将 .db 对局文件放在同目录下
            ./wargame-replay -dir ./data

            # 浏览器打开 http://127.0.0.1:8080
            ```

            也可启动后通过 Web 界面拖拽上传 `.db` 文件。
