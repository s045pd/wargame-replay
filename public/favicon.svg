<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a2332"/>
      <stop offset="100%" stop-color="#0d1520"/>
    </linearGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="inner" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Outer radar ring -->
  <circle cx="256" cy="256" r="190" fill="none" stroke="url(#ring)" stroke-width="3" opacity="0.3"/>

  <!-- Middle radar ring -->
  <circle cx="256" cy="256" r="140" fill="none" stroke="url(#ring)" stroke-width="2" opacity="0.25"/>

  <!-- Inner radar ring -->
  <circle cx="256" cy="256" r="90" fill="none" stroke="url(#ring)" stroke-width="2" opacity="0.2"/>

  <!-- Grid lines (graticule reference) -->
  <line x1="256" y1="66" x2="256" y2="446" stroke="#3b82f6" stroke-width="1.5" opacity="0.15"/>
  <line x1="66" y1="256" x2="446" y2="256" stroke="#3b82f6" stroke-width="1.5" opacity="0.15"/>

  <!-- Diagonal grid lines -->
  <line x1="122" y1="122" x2="390" y2="390" stroke="#3b82f6" stroke-width="1" opacity="0.08"/>
  <line x1="390" y1="122" x2="122" y2="390" stroke="#3b82f6" stroke-width="1" opacity="0.08"/>

  <!-- Crosshair arms -->
  <line x1="256" y1="100" x2="256" y2="200" stroke="url(#inner)" stroke-width="3" stroke-linecap="round"/>
  <line x1="256" y1="312" x2="256" y2="412" stroke="url(#inner)" stroke-width="3" stroke-linecap="round"/>
  <line x1="100" y1="256" x2="200" y2="256" stroke="url(#inner)" stroke-width="3" stroke-linecap="round"/>
  <line x1="312" y1="256" x2="412" y2="256" stroke="url(#inner)" stroke-width="3" stroke-linecap="round"/>

  <!-- Tick marks on crosshairs -->
  <line x1="248" y1="140" x2="264" y2="140" stroke="#60a5fa" stroke-width="2" opacity="0.5"/>
  <line x1="248" y1="372" x2="264" y2="372" stroke="#60a5fa" stroke-width="2" opacity="0.5"/>
  <line x1="140" y1="248" x2="140" y2="264" stroke="#60a5fa" stroke-width="2" opacity="0.5"/>
  <line x1="372" y1="248" x2="372" y2="264" stroke="#60a5fa" stroke-width="2" opacity="0.5"/>

  <!-- Center dot -->
  <circle cx="256" cy="256" r="6" fill="#60a5fa"/>
  <circle cx="256" cy="256" r="3" fill="#bfdbfe"/>

  <!-- Unit dots (red team - left side) -->
  <circle cx="175" cy="195" r="5" fill="#ef4444" opacity="0.9"/>
  <circle cx="160" cy="225" r="4" fill="#ef4444" opacity="0.7"/>
  <circle cx="185" cy="210" r="4" fill="#ef4444" opacity="0.8"/>
  <circle cx="148" cy="280" r="4" fill="#ef4444" opacity="0.6"/>
  <circle cx="190" cy="310" r="3.5" fill="#ef4444" opacity="0.5"/>

  <!-- Unit dots (blue team - right side) -->
  <circle cx="340" cy="305" r="5" fill="#3b82f6" opacity="0.9"/>
  <circle cx="355" cy="275" r="4" fill="#3b82f6" opacity="0.7"/>
  <circle cx="330" cy="290" r="4" fill="#3b82f6" opacity="0.8"/>
  <circle cx="365" cy="230" r="4" fill="#3b82f6" opacity="0.6"/>
  <circle cx="320" cy="200" r="3.5" fill="#3b82f6" opacity="0.5"/>

  <!-- Radar sweep glow (subtle) -->
  <path d="M256,256 L256,66 A190,190 0 0,1 390,122 Z" fill="#3b82f6" opacity="0.04"/>

  <!-- Corner bracket decorations (HUD style) -->
  <path d="M90,130 L90,90 L130,90" fill="none" stroke="#3b82f6" stroke-width="2.5" opacity="0.4" stroke-linecap="round"/>
  <path d="M382,90 L422,90 L422,130" fill="none" stroke="#3b82f6" stroke-width="2.5" opacity="0.4" stroke-linecap="round"/>
  <path d="M90,382 L90,422 L130,422" fill="none" stroke="#3b82f6" stroke-width="2.5" opacity="0.4" stroke-linecap="round"/>
  <path d="M382,422 L422,422 L422,382" fill="none" stroke="#3b82f6" stroke-width="2.5" opacity="0.4" stroke-linecap="round"/>

  <!-- "REPLAY" text at bottom -->
  <text x="256" y="462" text-anchor="middle" font-family="monospace, 'Courier New'" font-size="28" font-weight="bold" letter-spacing="8" fill="#3b82f6" opacity="0.5">REPLAY</text>
</svg>
